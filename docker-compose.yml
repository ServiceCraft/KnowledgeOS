services:
  traefik:
    image: traefik:v3.4
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "8080:80"
      - "8081:8080"   # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=PathPrefix(`/`)
      - traefik.http.routers.frontend.entrypoints=web
      - traefik.http.routers.frontend.priority=1
      - traefik.http.services.frontend.loadbalancer.server.port=80
    depends_on:
      - app

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=PathPrefix(`/api/`)
      - traefik.http.routers.api.entrypoints=web
      - traefik.http.routers.api.priority=2
      - traefik.http.services.api.loadbalancer.server.port=8080
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-knowledgeos}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-knowledgeos}
      - APP_PROFILE=${APP_PROFILE:-local}
      - JWT_SECRET=${JWT_SECRET}
      - SUPERADMIN_EMAIL=${SUPERADMIN_EMAIL}
      - SUPERADMIN_PASSWORD=${SUPERADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-knowledgeos}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-knowledgeos}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-knowledgeos}"]
      interval: 5s
      timeout: 5s
      retries: 5

  sync-agent:
    build:
      context: ./backend
      dockerfile: Dockerfile.sync
    profiles:
      - sync
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-knowledgeos}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-knowledgeos}
      - APP_PROFILE=${APP_PROFILE:-local}
      - CLOUD_API_URL=${CLOUD_API_URL}
      - CLOUD_API_KEY=${CLOUD_API_KEY}
      - SYNC_INTERVAL_SECONDS=${SYNC_INTERVAL_SECONDS:-60}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
